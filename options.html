<!DOCTYPE html>
<html>
<head><title>Streak Guardian Settings</title></head>
<body>
  <label>GitHub token: <input type="password" id="token" /></label>
  <label>GitHub username: <input type="text" id="username" /></label>
  <label>Check-in time: <input type="time" id="threshold" /></label>
  <label>Auto-commit repo owner: <input type="text" id="autoOwner" /></label>
  <label>Auto-commit repo name: <input type="text" id="autoRepo" /></label>
  <button id="save">Save</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
